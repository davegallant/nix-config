name: update hashes on renovate prs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - home/claude/package.nix
      - home/claude.nix
      - home/hunk/package.nix
      - home/obsidian.nix
      - home/pi/package.nix
      - overlays/subtui/default.nix

jobs:
  update-hashes:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: get changed files
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: update claude hashes
        if: contains(steps.changed.outputs.files, 'home/claude/package.nix')
        run: |
          VERSION=$(grep 'version = ' home/claude/package.nix | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          bash home/claude/update-hashes.sh "$VERSION"

      - name: update pi hashes
        if: contains(steps.changed.outputs.files, 'home/pi/package.nix')
        run: |
          VERSION=$(grep 'version = ' home/pi/package.nix | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          bash home/pi/update-hashes.sh "$VERSION"

      - name: update hunk hashes
        if: contains(steps.changed.outputs.files, 'home/hunk/package.nix')
        run: |
          VERSION=$(grep 'version = ' home/hunk/package.nix | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          bash home/hunk/update-hashes.sh "$VERSION"

      - name: update obsidian-git hash
        if: contains(steps.changed.outputs.files, 'home/obsidian.nix')
        run: |
          VERSION=$(grep 'obsidian-git/releases/download/' home/obsidian.nix | sed 's|.*/download/\([^/]*\)/.*|\1|')
          bash home/obsidian-update-hashes.sh "$VERSION"

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: update subtui hashes
        if: contains(steps.changed.outputs.files, 'overlays/subtui/default.nix')
        run: |
          VERSION=$(grep 'rev = ' overlays/subtui/default.nix | sed 's/.*rev = "v\([^"]*\)".*/\1/')
          bash overlays/subtui/update-hashes.sh "$VERSION"

      - name: update davegallant/skills hash
        if: contains(steps.changed.outputs.files, 'home/claude.nix')
        run: |
          REV=$(grep -A1 'repo = "skills"' home/claude.nix | grep 'rev =' | sed 's/.*rev = "\([^"]*\)".*/\1/')
          bash home/claude/update-skills-hash.sh "$REV"

      - name: commit and push updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add home/claude/package.nix home/claude.nix home/hunk/package.nix home/obsidian.nix home/pi/package.nix overlays/subtui/default.nix
          git diff --staged --quiet || git commit -m "chore: update hashes"
          git push
